<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Little Star</title>
    <style>
        body { background: radial-gradient(circle, #000428, #004e92); color: white; font-family: 'Comic Sans MS', cursive, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow-x: hidden; }
        .star-container { position: relative; width: 250px; height: 250px; border: 5px solid #ffd700; border-radius: 50%; overflow: hidden; box-shadow: 0 0 30px #ffd700; margin-bottom: 20px; }
        .star-container img { width: 100%; height: 100%; object-fit: cover; }
        h1 { font-size: 40px; color: #ffd700; text-shadow: 2px 2px 10px #fff; margin: 10px 0; }
        p { font-size: 20px; letter-spacing: 2px; }
        /* Sparkle animation */
        .sparkle { position: absolute; background: white; border-radius: 50%; animation: twinkle 2s infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="star-container">
        <!-- Change the link to your baby photo -->
        <img src="baby.jpg" alt="Stars Baby">
    </div>
    <h1>STARS BABY</h1>
    <p>✨ Our Little Angel ✨</p>
    
    <!-- Simple stars background -->
    <div class="sparkle" style="top: 10%; left: 20%; width: 5px; height: 5px;"></div>
    <div class="sparkle" style="top: 30%; right: 15%; width: 7px; height: 7px;"></div>
    <div class="sparkle" style="bottom: 20%; left: 10%; width: 4px; height: 4px;"></div>
</body>
</html>
