<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stars Baby | Precious Moments</title>
    <style>
        body { background: radial-gradient(circle, #000428, #004e92); color: white; font-family: 'Comic Sans MS', cursive, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* Main Top Photo (baby.jpg) */
        .main-photo { width: 180px; height: 180px; border: 5px solid #ffd700; border-radius: 50%; overflow: hidden; box-shadow: 0 0 25px #ffd700; margin-bottom: 10px; }
        .main-photo img { width: 100%; height: 100%; object-fit: cover; }

        h1 { color: #ffd700; text-shadow: 0 0 10px #fff; margin: 5px 0; font-size: 30px; letter-spacing: 2px; }
        .blessing { font-size: 16px; margin-bottom: 30px; opacity: 0.9; }

        /* Grid for baby2 and baby3 */
        .photo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 95%; max-width: 450px; }
        .grid-item { border: 3px solid #ffd700; border-radius: 15px; overflow: hidden; background: #000; box-shadow: 0 8px 15px rgba(0,0,0,0.5); }
        .grid-item img { width: 100%; height: 180px; display: block; object-fit: cover; }

        footer { margin-top: auto; padding: 30px 0; font-size: 11px; opacity: 0.6; letter-spacing: 1px; text-transform: uppercase; }
    </style>
</head>
<body>
    <!-- 1st Image: Main Center -->
    <div class="main-photo">
        <img src="baby.jpg" alt="Main Baby">
    </div>
    
    <h1>STARS BABY</h1>
    <div class="blessing">✨ Our Little Angel ✨</div>

    <!-- 2nd and 3rd Images: Side by Side -->
    <div class="photo-grid">
        <div class="grid-item"><img src="baby2.jpg" alt="Baby Moment 1"></div>
        <div class="grid-item"><img src="baby3.jpg" alt="Baby Moment 2"></div>
    </div>

    <footer>MADE WITH LOVE BY GAYATHRI</footer>
</body>
</html>
